<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOULSENSE</title>
  <link rel="stylesheet" href="/static/soulsense.css" />
</head>
<body>
  <canvas id="bg"></canvas>

  <div id="ring-container">
    <svg id="ring-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <!-- outer glow ring -->
      <circle id="ring-glow" cx="200" cy="200" r="160" fill="none" stroke-width="2"/>
      <!-- main ring -->
      <circle id="ring-main" cx="200" cy="200" r="140" fill="none" stroke-width="3"/>
      <!-- inner fill -->
      <circle id="ring-fill" cx="200" cy="200" r="138" />
      <!-- tick marks -->
      <g id="ticks"></g>
      <!-- centre label -->
      <text id="ring-value" x="200" y="190" text-anchor="middle" dominant-baseline="middle">0.00</text>
      <text id="ring-label" x="200" y="222" text-anchor="middle">MOTION</text>
    </svg>
  </div>

  <canvas id="wave"></canvas>

  <footer id="status-bar">
    <span id="status-dot" class="dot"></span>
    <span id="status-text">Connecting…</span>
    <span id="rssi-text"></span>
    <span class="brand">SOULSENSE</span>
  </footer>

  <script src="/static/soulsense.js"></script>
</body>
</html>
